# ============================================
# Production docker-compose for ECS
# Image is built by GitHub Actions and pushed to GHCR
# ============================================
services:
  app-server:
    image: ghcr.io/${GITHUB_REPO_OWNER:-MJB-bot}/app-server:latest
    container_name: app-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://host.docker.internal:3306/db2504?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-root}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-YTJkN2Y4OWMtM2E1Yi00ZjZkLWJhMzktOGYzMjRmNjU2ZDQxLWJvc3MtemhpcGluLXNlY3JldC1rZXktcHJvZHVjdGlvbg==}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      # Logging
      LOGGING_LEVEL_COM_BOSSZHIPIN: ${LOG_LEVEL:-info}
    volumes:
      - /opt/app/uploads:/app/uploads
      - /opt/app/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/jobs/hot || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
