name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Image registry
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/app-server

jobs:
  # ============================================
  # Test
  # ============================================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -B

  # ============================================
  # Build & Deploy
  # ============================================
  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Skip test failure? No — deploy only if tests pass
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------
      # Login to GitHub Container Registry
      # ----------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------
      # Build & push Docker image
      # ----------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------
      # Deploy to ECS via SSH
      # ----------------------------------------
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            echo "=== Pulling latest image ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "=== Restarting container ==="
            cd /opt/app
            docker compose down --remove-orphans || true
            docker compose up -d

            echo "=== Waiting for healthy ==="
            sleep 10
            docker ps --filter name=app-server --format 'table {{.Names}}\t{{.Status}}'

            echo "=== Cleaning old images ==="
            docker image prune -af --filter "until=24h"
            docker builder prune -f

            echo "=== Deploy done ==="
