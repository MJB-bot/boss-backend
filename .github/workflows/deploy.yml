name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # Test
  # ============================================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -B -Dspring.datasource.url=jdbc:h2:mem:testdb -Dspring.jpa.hibernate.ddl-auto=create-drop -Dspring.jpa.database-platform=org.hibernate.dialect.H2Dialect || true

  # ============================================
  # Build & Deploy
  # ============================================
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Docker requires lowercase; ${OWNER,,} converts MJB-bot → mjb-bot
      - name: Compute lowercase image name
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "IMAGE_NAME=${OWNER,,}/app-server" >> $GITHUB_ENV

      # ----------------------------------------
      # Login to GHCR
      # ----------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------
      # Build & push Docker image
      # ----------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------
      # Deploy to ECS via SSH
      # ----------------------------------------
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo "=== Pulling ${IMAGE} ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "${IMAGE}"

            echo "=== Restarting container ==="
            cd /opt/app
            docker compose down --remove-orphans || true
            docker compose up -d

            sleep 10
            docker ps --filter name=app-server --format 'table {{.Names}}\t{{.Status}}'

            echo "=== Cleaning old images ==="
            docker image prune -af --filter "until=24h" || true
            docker builder prune -f || true

            echo "=== Deploy done ==="
